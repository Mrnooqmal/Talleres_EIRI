<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIRI Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=20260615">
    <link rel="stylesheet" href="/static/css/arena.css?v=4">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="arena-body">
    <main id="arena" class="arena">
      <header class="ar-top">
        <a href="/" class="ar-brand"><i data-lucide="zap"></i> EIRI ARENA</a>
        <div class="ar-top-actions">
          <button id="ar-mute" class="ar-icon-btn" title="Silenciar (M)"><i data-lucide="volume-2"></i></button>
          <button id="ar-fs" class="ar-icon-btn" title="Pantalla completa (F)"><i data-lucide="maximize"></i></button>
        </div>
      </header>
      <section id="ph-select" class="ar-phase"></section>
      <section id="ph-intro" class="ar-phase" hidden></section>
      <section id="ph-fight" class="ar-phase" hidden></section>
      <section id="ph-victory" class="ar-phase" hidden></section>
    </main>
    <script src="/static/js/arena.js?v=4"></script>
</body>
</html>
