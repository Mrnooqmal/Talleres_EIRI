<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería, {{ config.site_title or 'EIRI' }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .gallery-page-hero {
            background: linear-gradient(135deg, #012232 0%, #023a5e 45%, #0a4d8c 100%);
            padding: calc(var(--header-h) + 3rem) 0 3rem;
            text-align: center;
        }
        .gallery-page-hero .section-title { color: var(--white); }
        .gallery-page-grid {
            background: var(--bg-0);
            padding: 3rem 0 6rem;
        }
        .gallery-full-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        @media (max-width: 900px) { .gallery-full-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width: 580px) { .gallery-full-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="site-header" id="siteHeader">
    <div class="header-logos">
        <div class="header-logos-inner">
            <img src="/static/logo_udd.svg" alt="Universidad del Desarrollo" class="header-logo-udd">
            <span class="header-logo-sep"></span>
            <img src="/static/logo_informatica.png" alt="Informática UDD" class="header-logo-inf">
        </div>
    </div>
    <nav class="navbar" id="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <span class="nav-eiri">EIRI</span>
                <span class="nav-sub">Talleres de Robótica</span>
            </a>
            <ul class="nav-links">
                <li><a href="/#home">Inicio</a></li>
                <li><a href="/#sesiones">Sesiones</a></li>
                <li><a href="/#about">EIRI</a></li>
                <li><a href="/#ranking">Ranking</a></li>
                <li><a href="/galeria">Galería</a></li>
            </ul>
            <button class="nav-burger" id="navBurger" aria-label="Menú">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="nav-mobile" id="navMobile">
            <a href="/#home" class="nav-m-link">Inicio</a>
            <a href="/#sesiones" class="nav-m-link">Sesiones</a>
            <a href="/#about" class="nav-m-link">EIRI</a>
            <a href="/#ranking" class="nav-m-link">Ranking</a>
            <a href="/galeria" class="nav-m-link">Galería</a>
        </div>
    </nav>
</header>

<div class="gallery-page-hero">
    <div class="container">
        <div class="label">Momentos</div>
        <h1 class="section-title" style="margin-top:0.4rem">Galería</h1>
        <p class="section-desc" style="margin:0.8rem auto 0">Fotos y videos de los talleres, construcciones y la batalla final.</p>
    </div>
</div>

<div class="gallery-page-grid">
    <div class="container">
        <div id="galleryFullGrid" class="gallery-full-grid">
            <div class="gallery-empty" style="grid-column:1/-1">
                <i data-lucide="image"></i>
                <p style="margin-top:0.6rem">Sin contenido aún.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/dompurify/dist/purify.min.js"></script>
<script src="/static/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const grid = document.getElementById('galleryFullGrid');
    try {
        const items = await fetch('/api/gallery').then(r => r.json());
        if (!items.length) return;
        grid.innerHTML = items.map(buildGalleryItem).join('');
        lucide.createIcons({ nodes: [grid] });
    } catch {}
    lucide.createIcons();
});
</script>
</body>
</html>
